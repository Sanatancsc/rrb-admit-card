<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Applicant Login</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { background-color: rgb(93, 155, 251); font-family: Arial, sans-serif; }
        .Login-container { max-width: 550px; margin: 40px auto; background: #fff; padding: 0px; border-radius: 4px; box-shadow: 0px 4px 10px rgba(0,0,0,0.2); overflow: hidden; }
        .login_body { padding: 25px; }
        .login_body h2 { font-size: 18px; color: #333; font-weight: bold; border-bottom: 2px solid #337ab7; padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        .form-group label { font-weight: bold; color: #444; font-size: 13px; }
        .redTxt { color: red; }
        .mandatoryinput { background: rgb(254, 255, 211) !important; color: rgb(51, 51, 51); height: 40px; }
        .dob-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .dob-container select { height: 40px; font-size: 14px; border-radius: 4px; border: 1px solid #ccc; padding: 5px; flex: 1; }
        .captcha-box { background: #efefef; border: 1px solid #ddd; padding: 10px; border-radius: 3px; width: 240px; margin: 15px auto; text-align: center; }
        .captcha-img-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 8px; }
        .captcha-box span { font-weight: bold; font-style: italic; letter-spacing: 5px; background: #fff; padding: 5px 15px; border: 1px dashed #999; font-size: 20px; color: #003366; user-select: none; display: inline-block; }
        .refresh-btn { cursor: pointer; color: #003442; font-size: 18px; text-decoration: none; font-weight: bold; }
        .btn-login { width: 100%; max-width: 150px; background-color: #337ab7; color: white; padding: 10px; border: none; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; display: block; margin: 20px auto 0 auto; text-align: center; }
        .btn-login:hover { background-color: #286090; color: white; text-decoration: none; }
        .error-div { color: red; font-weight: bold; text-align: center; margin-bottom: 15px; min-height: 20px; }
        .hinttext { text-align: center; color: #777; font-size: 11px; margin-top: 25px; }
    </style>
</head>
<body>

<section class="wrpdashboard">
    <div class="container-fluid">
        <div class="Login-container">
            <div id="log" class="login_body">
                <h2>प्रत्याशी लॉग इन/ Candidate Login</h2>
                
                <div id="ERROR_PLACE_DIV" class="error-div"></div>

                <div class="form-group">
                    <label>पंजीकरण संख्या/ Registration Number <i class="redTxt">*</i></label>
                    <input type="text" placeholder="Enter Registration Number." maxlength="15" id="userid" class="form-control mandatoryinput">
                </div>
                
                <div class="form-group">
                    <label>उपयोगकर्ता पासवर्ड/ User Password (Date of Birth) <i class="redTxt">*</i></label>
                    <div class="dob-container">
                        <select id="confData1">
                            <option value="">DD</option>
                            <script>
                                for(let i=1; i<=31; i++) {
                                    let val = i < 10 ? '0' + i : i;
                                    document.write(`<option value="${val}">${val}</option>`);
                                }
                            </script>
                        </select>
                        <select id="confData2">
                            <option value="">MM</option>
                            <script>
                                for(let i=1; i<=12; i++) {
                                    let val = i < 10 ? '0' + i : i;
                                    document.write(`<option value="${val}">${val}</option>`);
                                }
                            </script>
                        </select>
                        <select id="confData3">
                            <option value="">YYYY</option>
                            <script>
                                for(let i=2026; i>=1950; i--) {
                                    document.write(`<option value="${i}">${i}</option>`);
                                }
                            </script>
                        </select>
                    </div>
                    <label style="font-weight: normal; color: #666;">(Eg. 26 / 01 / 1990)</label>
                </div>

                <div class="captcha-box">
                    <div class="captcha-img-row">
                        <span id="captchaImg"></span>
                        <a href="javascript:void(0)" class="refresh-btn" onclick="generateCaptcha()" title="Get New Image">🔄</a>
                    </div>
                    <input type="text" id="inputBox" class="form-control" placeholder="Type numbers as shown in image" style="text-align: center; height: 35px;">
                </div>

                <a href="javascript:void(0)" onclick="fnLogin()" class="btn-login">लॉग इन करें/ Login</a>
                
                <div class="hinttext">Version 15.02.01</div>
            </div>
        </div>
    </div>
</section>

<script>
    var currentCaptcha = "";
    function generateCaptcha() {
        currentCaptcha = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById("captchaImg").innerText = currentCaptcha;
        document.getElementById("inputBox").value = "";
    }
    window.onload = generateCaptcha;

    function fnLogin() {
        var userId = document.getElementById("userid").value.trim();
        var dd = document.getElementById("confData1").value;
        var mm = document.getElementById("confData2").value;
        var yyyy = document.getElementById("confData3").value;
        var captchaInput = document.getElementById("inputBox").value.trim();
        var errorPlace = document.getElementById("ERROR_PLACE_DIV");

        var correctRoll = "H42508495378";
        var correctDob = "03-04-2003";

        if (userId === '') { alert("Please enter a valid Registration Number."); return false; }
        if (dd === '' || mm === '' || yyyy === '') { alert("Please enter a valid Password."); return false; }
        if (captchaInput === '') { alert("Please enter the Captcha."); return false; }

        if (captchaInput !== currentCaptcha) {
            errorPlace.innerText = "Please enter correct text shown in image";
            generateCaptcha();
            return false;
        }

        var enteredDob = dd + "-" + mm + "-" + yyyy;
        if (userId === correctRoll && enteredDob === correctDob) {
            // लॉगिन सही होने पर 'download.html' पेज पर भेजें
            window.location.href = "download.html";
        } else {
            errorPlace.innerText = "* Incorrect Credentials.";
            generateCaptcha();
        }
    }
</script>

</body>
</html>
